name: Build Windows Portable EXE

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build application
        run: |
          pyinstaller --noconfirm --onefile --windowed --name Vato --icon=static/vato_v_white.ico --add-data "languages;languages/" --add-data "static;static/" --collect-all customtkinter main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Vato-Windows-Portable
          path: dist/*.exe
